site_name: Guidewire Learning Journal
site_description: Personal knowledge base — BillingCenter, Gosu, Architecture & AI
site_author: Sakthivel S
site_url: https://Sakthi-S99.github.io/guidewire-learning-journal/

repo_name: guidewire-learning-journal
repo_url: https://github.com/Sakthi-S99/guidewire-learning-journal
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Concepts:
    - Overview: concepts/index.md
    - Invoicing: concepts/invoicing/index.md
    - Payment Plans: concepts/payment-plans/index.md
    - Delinquency: concepts/delinquency/index.md
    - BillingCenter Core: concepts/billing-center-core/index.md
  - Gosu Patterns:
    - Overview: gosu-patterns/index.md
    - Bundle Handling: gosu-patterns/bundle-handling.md
    - Query Patterns: gosu-patterns/query-patterns.md
    - Common Pitfalls: gosu-patterns/common-pitfalls.md
  - Architecture:
    - Overview: architecture/index.md
    - Design Decisions: architecture/design-decisions/index.md
    - Integration Patterns: architecture/integration-patterns/index.md
  - RCA Library:
    - Overview: rca-library/index.md
    - Template: rca-library/template.md
  - AI & Privacy:
    - Overview: ai-privacy/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sakthi-S99
    - icon: fontawesome/brands/linkedin
      link: www.linkedin.com/in/sakthi-s99

copyright: Copyright &copy; 2025 — Personal Learning Journal
